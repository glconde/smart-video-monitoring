AWSTemplateFormatVersion: 2010-09-09

Parameters:
  OpenSearchPassword:
    Type: String
    Description: Password for OpenSearch Console
    Default: ""
    NoEcho: true

Resources:
  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: kvs-workshop-domain
      EngineVersion: "OpenSearch_2.9"
      AdvancedSecurityOptions:
        Enabled: true
        InternalUserDatabaseEnabled: true
        MasterUserOptions:
          MasterUserName: admin
          MasterUserPassword: !Ref OpenSearchPassword
      ClusterConfig:
        InstanceCount: 1
        InstanceType: "t3.small.search"
      CognitoOptions:
        Enabled: false
      DomainEndpointOptions:
        CustomEndpointEnabled: false
        EnforceHTTPS: true
        TLSSecurityPolicy: Policy-Min-TLS-1-2-2019-07
      EBSOptions:
        EBSEnabled: true
        VolumeSize: 10
        VolumeType: "gp2"
      EncryptionAtRestOptions:
        Enabled: true
      NodeToNodeEncryptionOptions:
        Enabled: true
      AccessPolicies:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              AWS: "*"
            Action: "es:*"
            Resource: !Sub "arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/kvs-workshop-domain/*"

Outputs:
  OpenSearchARN:
    Value: !GetAtt OpenSearchDomain.Arn
  OpenSearchURL:
    Value: !GetAtt OpenSearchDomain.DomainEndpoint